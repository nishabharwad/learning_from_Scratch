<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>

    <style>
    .uber
    {
        background-color:black;
        color:white;
        border:none;
        width:115px;
        height:32px;
        margin-bottom:10px;
        cursor:pointer;
        transition:opacity 0.15s;
    }   
    .uber:hover{
      opacity:0.8;
    } 
    .amazon
    {
        background-color:rgb(255, 216, 20);
        width:130px;
        border:none;
        height:24px;
        border-radius:12px;
        font-size:small;
        margin-bottom:10px;
        cursor:pointer;
        transition:background-color 0.15s;
    }

  .amazon:hover{
    background-color:rgb(208, 175, 10);
  }
    .github
    {
        background-color:rgb(46,164,79);
        color:white;
        font-weight:bold;
        width:70px;
        height:32px;
        border:none;
        border-radius:5px;
        margin-bottom: 10px;
        cursor:pointer;
        transition:box-shadow 0.15s;
       
    }
    .github:hover{
        box-shadow:0 3px 3px rgba(0,0,0,0.15);
    }
    .bootstrap
    {
        background-color: rgb(121,82,179);
        color:white;
        font-weight:bold;
        height:32px;
        width: 115px;
        border:none;
        border-radius:3px;
        margin-right:8px;
        margin-bottom:10px;
        cursor:pointer;
        transition:background-color 0.15s;
    }
    .bootstrap:hover{
      background-color:rgb(107, 73, 157);
    }
    .bootstrap2
    {
        background-color:white;
        color:rgb(108,117,125);
        font-weight:bold;
        width:115px;
        height:32px;
        border-style:solid;
        border-width:1px;
        border-color:rgb(108,117,125);
        border-radius:3px;
        margin-bottom:10px;
        cursor:pointer;
        transition:background-color 0.15s,color 0.15s;
    }
    .bootstrap2:hover{
       background-color:rgb(108,117,125);
        color:white;
    }
    .linkedin
    {
        background-color: rgb(10,102,194);
        color:white;
        font-weight:bold;
        border:none;
        height:32px;
        border-radius:16px;
        width:215px;
        margin-right:8px;
        cursor:pointer;
        transition:background-color 0.15s;
    }
    .linkedin:hover{
      background-color: rgb(7, 77, 147);
    }
    .save
    {
        cursor:pointer;
        background-color:white;
        color:rgb(10,102,194);
        border-style:solid;
        border-color:rgb(10,102,194);
        font-weight:bold;
        height:32px;
        width:75px;
        border-width:1px;
        border-radius:16px;
        transition:border-width 0.15s,background-color 0.15s;
    }
    .save:hover{
      border-width:2px;
      background-color:rgb(198, 204, 210);
    }
    </style>
</head>
<body>
  <button class="uber">
    Request now
  </button>  
  <br>
  <button class="amazon">
    Add to Cart
  </button>
  <br>
  <button class="github">
    Sign up
  </button>
  <br>
  <button class="bootstrap">
    Get started
  </button>
  <button class="bootstrap2">
    Download
  </button>
  <br>
  <button class="linkedin">
    Apply on company website 
  </button>
  <button class="save">
    Save
  </button>
  
</body>
</html>
