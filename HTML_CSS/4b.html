<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .stretch{
            background-color:green;
            color:white;
            transition:padding-right 0.40s,padding-left 0.40s,padding-top 0.40s,padding-bottom 0.40s;
            border-style:none;
            margin-left:20px;
            margin-top:20px;
            cursor:pointer;
        
        }
        .stretch:hover{
            padding-left:30px;
            padding-right:30px;
            padding-top:10px;
            padding-bottom:10px;
        }
        .shadow{
            background-color:green;
            color:white;
        }
    </style>
</head>
<body>
    <button class="stretch">Stretch</button>
     
</body>
</html>
